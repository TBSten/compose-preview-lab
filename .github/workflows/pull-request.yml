name: Pull Request Check
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Run Lint
        shell: bash
        run: ./gradlew ktlintCheck
  validate-binary-compatibility:
    name: Validate Binary Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Validate Binary Compatibility
        shell: bash
        run: ./gradlew apiCheck
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Jvm
            test_task: jvmTest
            os: ubuntu-latest
            kotest_tags: '!PBT'
          - name: JS
            test_task: jsBrowserTest
            os: ubuntu-latest
            kotest_tags: ''
          - name: Wasm JS
            test_task: wasmJsBrowserTest
            os: ubuntu-latest
            kotest_tags: ''
          - name: Android Debug
            test_task: testDebugUnitTest # compose ui test on local android is not supported yet
            os: ubuntu-latest
            kotest_tags: ''
          - name: Android Release
            test_task: testReleaseUnitTest
            os: ubuntu-latest
            kotest_tags: ''
          - name: iOS
            test_task: iosSimulatorArm64Test
            os: macos-latest
            kotest_tags: ''
    runs-on: ${{ matrix.os }}
    name: Test ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Test Library
        shell: bash
        run: ./gradlew ${{ matrix.test_task }} ${{ matrix.kotest_tags && format('-Dkotest.tags="{0}"', matrix.kotest_tags) || '' }}
      - name: Test Integration Test
        shell: bash
        run: cd ./integrationTest && ./gradlew ${{ matrix.test_task }} ${{ matrix.kotest_tags && format('-Dkotest.tags="{0}"', matrix.kotest_tags) || '' }}
      - name: Test Docs
        if: matrix.test_task == 'jvmTest'
        shell: bash
        run: cd ./docs && ./gradlew jvmTest ${{ matrix.kotest_tags && format('-Dkotest.tags="{0}"', matrix.kotest_tags) || '' }}
  test-kotlin-compat:
    strategy:
      fail-fast: false
      matrix:
        include:
          - kotlin_version: '2.3.20'
            compose_version: '1.11.0-alpha05'
            gradle_version: '8.14.4'
          - kotlin_version: '2.4.0-Beta1'
            compose_version: '1.11.0-alpha05'
            gradle_version: '9.4.1'
    runs-on: ubuntu-latest
    name: Compat Kotlin ${{ matrix.kotlin_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Switch Kotlin / Compose version
        shell: bash
        run: |
          sed -i "s/^kotlin = .*/kotlin = \"${{ matrix.kotlin_version }}\"/" gradle/libs.versions.toml
          sed -i "s/^compose = .*/compose = \"${{ matrix.compose_version }}\"/" gradle/libs.versions.toml
          # buildLogic の kotlin-dsl は embedded-kotlin を使うため、
          # プロジェクトの kotlinJvm プラグインを除去して衝突を回避
          sed -i '/alias(libs.plugins.kotlinJvm)/d' buildLogic/build.gradle.kts
          echo "Updated versions:"
          grep -E "^(kotlin|compose) = " gradle/libs.versions.toml
      - name: Upgrade Gradle wrapper
        if: matrix.gradle_version
        shell: bash
        run: |
          sed -i "s|gradle-.*-bin.zip|gradle-${{ matrix.gradle_version }}-bin.zip|" gradle/wrapper/gradle-wrapper.properties
      - name: Verify compiler-plugin compiles
        shell: bash
        run: ./gradlew :compiler-plugin:compileKotlin --no-configuration-cache
  publish-to-maven-local:
    name: Publish to Maven Local
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Publish to Maven Local
        shell: bash
        run: ./gradlew publishToMavenLocal
